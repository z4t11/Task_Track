{% extends 'todos/base.html' %}

{% block content %}
<div class="page-card">
    <h2>Reset password</h2>
    <form method="post" class="form-card">
        {% csrf_token %}
        <label>Email
            {{ form.email }}
        </label>
        <div class="button-row">
            <button type="submit" class="button-link">Send reset link</button>
        </div>
    </form>
</div>
{% endblock %}
