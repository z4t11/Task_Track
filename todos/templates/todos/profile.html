{% extends 'todos/base.html' %}

{% block content %}
<div class="page-card">
    <h2>Your profile</h2>
    <form method="post" class="form-card">
        {% csrf_token %}
        {{ form.non_field_errors }}
        <label>Username
            {{ form.username }}
        </label>
        <label>Email
            {{ form.email }}
        </label>
        <label>First name
            {{ form.first_name }}
        </label>
        <label>Last name
            {{ form.last_name }}
        </label>
        <div class="button-row">
            <button type="submit" class="button-link">Save</button>
        </div>
    </form>
</div>
{% endblock %}
