{% extends 'todos/base.html' %}

{% block content %}
<div class="page-card">
    <h2>Set new password</h2>
    <form method="post" class="form-card">
        {% csrf_token %}
        {{ form.new_password1 }}
        {{ form.new_password2 }}
        <div class="button-row">
            <button type="submit" class="button-link">Set password</button>
        </div>
    </form>
</div>
{% endblock %}
